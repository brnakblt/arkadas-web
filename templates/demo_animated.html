<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastgele Polinom Animasyonu</title>
    <link rel="stylesheet" href="_animated_decorations.css">
    <style>
        /* Ekstra stil: Çizgilerin karışım modunu güzelleştirelim */
        .path-draw {
            mix-blend-mode: multiply; /* Renklerin üst üste bindiğinde karışmasını sağlar */
        }
    </style>
</head>
<body>

    <!-- ARKA PLAN: Dinamik SVG -->
    <div class="bg-animated-graph">
        <svg id="polyGraph" width="100%" height="100%" viewBox="0 0 1440 800" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            
            <!-- Arka Plan Izgarası -->
            <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ccc" stroke-width="0.5" stroke-opacity="0.2"/>
            </pattern>
            <rect width="100%" height="100%" fill="url(#smallGrid)" />

            <!-- Çizgiler (Yolları JS ile doldurulacak) -->
            <!-- 1. Turuncu -->
            <path id="line1" class="path-draw" fill="none" stroke="#F97316" stroke-width="3" stroke-opacity="0.6" />
            
            <!-- 2. Yeşil -->
            <path id="line2" class="path-draw path-draw-delay" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-opacity="0.6" style="animation-delay: 0.3s" />
            
            <!-- 3. Sarı Tonlu (Kontrast için) -->
            <path id="line3" class="path-draw path-draw-delay" fill="none" stroke="#EAB308" stroke-width="2" stroke-opacity="0.5" style="animation-delay: 0.6s" />

        </svg>
    </div>

    <!-- İÇERİK KARTI -->
    <div class="container">
        <div class="glass-card">
            <div class="math-badge">
                <span>Rastgele Fonksiyon Üretici v1.0</span>
            </div>

            <div style="display: table;">
                <h1 class="tech-title">Dinamik Grafikler_</h1>
            </div>

            <p class="tech-subtitle">
                Her yenilemede benzersiz parametreler hesaplanıyor.<br>
                Bézier eğrileri rastgele kontrol noktalarıyla oluşturuldu.
            </p>

            <hr style="border: 0; border-top: 1px dashed #94a3b8; margin: 20px 0;">
            
            <p style="color: #475569; font-size: 0.9rem;">
                <strong>F5'e basarak</strong> (sayfayı yenileyerek) yeni bir grafik kombinasyonu oluşturabilirsiniz.
            </p>

            <button onclick="generateRandomPaths()" style="
                margin-top: 1rem;
                background: white;
                color: #333;
                border: 1px solid #ccc;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 0.85rem;
                display: flex;
                align-items: center;
                gap: 5px;
            ">
                <span style="font-size: 1.2em;">↻</span> Yeniden Çiz
            </button>
        </div>
    </div>

    <!-- JAVASCRIPT: Rastgele Yol Oluşturucu -->
    <script>
        function generateRandomPaths() {
            // Ekran genişliği ve yüksekliği (ViewBox bazlı)
            const w = 1440;
            const h = 800;

            // Rastgele sayı üreteci (min ve max dahil)
            const rnd = (min, max) => Math.random() * (max - min) + min;

            // 3 çizgi için döngü
            const lines = ['line1', 'line2', 'line3'];
            
            lines.forEach((lineId, index) => {
                const pathEl = document.getElementById(lineId);
                
                // Başlangıç Yüksekliği (Sol taraf) - Ekranın ortalarında bir yer
                const startY = rnd(h * 0.3, h * 0.7);
                
                // Bitiş Yüksekliği (Sağ taraf)
                const endY = rnd(h * 0.2, h * 0.8);

                // 1. Kontrol Noktası (X: 1/3, Y: Rastgele)
                const cp1x = w * 0.33;
                const cp1y = rnd(0, h);

                // 2. Kontrol Noktası (X: 2/3, Y: Rastgele)
                const cp2x = w * 0.66;
                const cp2y = rnd(0, h);

                // Kübik Bezier Yolu Oluşturma
                // M: Move to (Başlangıç)
                // C: Cubic Bezier (Kontrol1, Kontrol2, Bitiş)
                
                // Daha karmaşık görünmesi için "S" komutuyla ikinci bir dalga ekliyoruz
                const midX = w * 0.5;
                const midY = rnd(h * 0.2, h * 0.8);

                // Yol 1: Başlangıç -> Orta
                // Yol 2: Orta -> Bitiş (S komutu yumuşak geçiş sağlar)
                
                const d = `
                    M -50,${startY} 
                    C ${w * 0.2},${rnd(0, h)} ${w * 0.4},${rnd(0, h)} ${midX},${midY}
                    S ${w * 0.8},${rnd(0, h)} ${w + 50},${endY}
                `;

                pathEl.setAttribute('d', d.replace(/\s+/g, ' ').trim());

                // Animasyonu yeniden tetiklemek için class'ı kaldırıp ekle (Yeniden çiz butonu için)
                pathEl.style.animation = 'none';
                pathEl.offsetHeight; /* trigger reflow */
                pathEl.style.animation = null; 
            });
        }

        // Sayfa yüklendiğinde çalıştır
        window.addEventListener('load', generateRandomPaths);
    </script>

</body>
</html>
